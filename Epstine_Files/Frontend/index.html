
<!DOCTYPE html>
<html lang="en" style="height: 100%;">
<head>
    <meta charset="UTF-8">
    <!-- interactive-widget=resizes-content keeps the viewport height stable when
         the on-screen keyboard opens, preventing the page from jumping. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
    <title>Jchat | Messenger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        /*
         * --vh polyfill: set by the JS below for browsers that don't support dvh.
         * Falls back gracefully to 1vh on very old browsers.
         */
        :root { --vh: 1vh; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b141a;
            color: #e9edef;
            margin: 0;
            overflow: hidden;
            /* dvh = dynamic viewport height: excludes browser chrome (address bar, tabs).
               Fallback chain: dvh → --vh custom property → 100vh */
            height: 100dvh;
            height: calc(var(--vh) * 100);
        }
        #root {
            height: 100%;
        }
        .j-logo {
            font-family: 'Playfair Display', serif;
            color: #ff3b30;
            text-shadow: 0 0 10px rgba(255, 59, 48, 0.3);
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: #374151;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>

<!-- Mobile viewport height fix:
     Sets --vh to the actual visible height so body/app fills exactly
     the visible area, excluding browser chrome (address bar, tabs, etc.).
     This is a polyfill for browsers that don't yet support `dvh`. -->
<script>
  (function () {
    function setVh() {
      var vh = (window.visualViewport ? window.visualViewport.height : window.innerHeight) * 0.01;
      document.documentElement.style.setProperty('--vh', vh + 'px');
    }
    setVh();
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', setVh);
    } else {
      window.addEventListener('resize', setVh);
      window.addEventListener('orientationchange', setVh);
    }
  })();
</script>
</body>
</html>
